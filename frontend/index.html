<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MediQueue — Smart Hospital Queue Management</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="app">

    <!-- ── NAVBAR ── -->
    <nav class="nav">
      <div class="nav-logo">
        <div class="cross">+</div>
        MediQueue
      </div>
      <div class="nav-tabs" id="navTabs">
        <button class="nav-tab active" onclick="navigate('home')">Home</button>
        <button class="nav-tab" onclick="navigate('patient')">Patient</button>
        <button class="nav-tab" onclick="navigate('doctor')">Doctor</button>
        <button class="nav-tab" onclick="navigate('admin')">Admin</button>
        <button class="nav-tab" onclick="navigate('display')">Queue Display</button>
      </div>
      <div class="nav-user">
        <div class="avatar" id="navAvatarEl">P</div>
        <span id="navUserName">Demo User</span>
      </div>
    </nav>

    <!-- ── MAIN ── -->
    <div class="main">

      <!-- HOME -->
      <div id="page-home" class="page active">
        <div id="home-root"></div>
      </div>

      <!-- PATIENT -->
      <div id="page-patient" class="page">
        <div id="patient-root"></div>
      </div>

      <!-- DOCTOR -->
      <div id="page-doctor" class="page">
        <div id="doctor-root"></div>
      </div>

      <!-- ADMIN -->
      <div id="page-admin" class="page">
        <div id="admin-root"></div>
      </div>

      <!-- QUEUE DISPLAY -->
      <div id="page-display" class="page">
        <div id="display-root"></div>
      </div>

    </div>
  </div>

  <!-- MODALS -->
  <div id="modal-container"></div>

  <!-- TOAST -->
  <div id="toast"></div>

  <!-- SCRIPTS -->
  <script src="js/data.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/components.js"></script>
  <script src="js/pages/home.js"></script>
  <script src="js/pages/patient.js"></script>
  <script src="js/pages/doctor.js"></script>
  <script src="js/pages/admin.js"></script>
  <script src="js/pages/display.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
